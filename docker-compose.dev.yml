version: '3.8'

services:
  # PostgreSQL 数据库（使用您指定的镜像）
  postgres:
    image: zhcoder-docker-registry.com:8000/official/postgres:latest
    container_name: oops-ai-postgres-dev
    environment:
      POSTGRES_DB: oops_ai_dev
      POSTGRES_USER: oops_user
      POSTGRES_PASSWORD: oops_password
    volumes:
      - postgres_dev_data:/var/lib/postgresql
      - ./backend/init.sql:/docker-entrypoint-initdb.d/init.sql
    ports:
      - "5432:5432"
    networks:
      - oops-ai-dev-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U oops_user -d oops_ai_dev"]
      interval: 10s
      timeout: 5s
      retries: 5

  # 后端应用（开发模式）
  backend:
    build:
      context: .
      dockerfile: Dockerfile.dev
    container_name: oops-ai-backend-dev
    environment:
      NODE_ENV: development
      DATABASE_URL: postgresql://oops_user:oops_password@postgres:5432/oops_ai_dev
      PORT: 3000
      JWT_SECRET: your-jwt-secret-key-change-in-production
      # LLM API 密钥（通过环境变量传递）
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      DEEPSEEK_API_KEY: ${DEEPSEEK_API_KEY:-}
      QIANWEN_API_KEY: ${QIANWEN_API_KEY:-}
    ports:
      - "3000:3000"
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - oops-ai-dev-network
    volumes:
      - /app/backend/node_modules
    working_dir: /app/backend
    command: sh -c "npx prisma migrate dev && npm run start:dev"
    restart: unless-stopped

  # 前端应用（开发模式）
  frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend.dev
    container_name: oops-ai-frontend-dev
    ports:
      - "5173:5173"
    environment:
      NODE_ENV: development
      VITE_API_URL: http://localhost:3000
    depends_on:
      - backend
    networks:
      - oops-ai-dev-network
    volumes:
      - /app/frontend/node_modules
    working_dir: /app/frontend
    command: npm run dev -- --host
    restart: unless-stopped

  # ChromaDB 向量数据库（开发模式）
  chromadb:
    image: zhcoder-docker-registry.com:8000/official/chromadb/chroma:latest
    container_name: oops-ai-chromadb-dev
    ports:
      - "8000:8000"
    environment:
      - IS_PERSISTENT=TRUE
      - PERSIST_DIRECTORY=/chroma/chroma
    volumes:
      - chromadb_dev_data:/chroma/chroma
    networks:
      - oops-ai-dev-network
    restart: unless-stopped

networks:
  oops-ai-dev-network:
    driver: bridge

volumes:
  postgres_dev_data:
    driver: local
  chromadb_dev_data:
    driver: local