version: "3.8"

services:
  # PostgreSQL 数据库
  postgres:
    image: zhcoderd-docker-registry.com:8000/official/postgres:15-alpine
    container_name: oops-ai-postgres
    environment:
      POSTGRES_DB: oops_ai
      POSTGRES_USER: oops_user
      POSTGRES_PASSWORD: oops_password
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./backend/init.sql:/docker-entrypoint-initdb.d/init.sql
    ports:
      - "5432:5432"
    networks:
      - oops-ai-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U oops_user -d oops_ai"]
      interval: 10s
      timeout: 5s
      retries: 5

  # 后端应用
  backend:
    build:
      context: .
      dockerfile: Dockerfile
      target: production
    container_name: oops-ai-backend
    environment:
      NODE_ENV: production
      DATABASE_URL: postgresql://oops_user:oops_password@postgres:5432/oops_ai
      PORT: 3000
      JWT_SECRET: your-jwt-secret-key-change-in-production
      # LLM API 密钥（通过环境变量传递）
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      DEEPSEEK_API_KEY: ${DEEPSEEK_API_KEY:-}
      QIANWEN_API_KEY: ${QIANWEN_API_KEY:-}
    ports:
      - "3000:3000"
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - oops-ai-network
    volumes:
      - ./backend/.env:/app/backend/.env:ro
    restart: unless-stopped

  # 前端应用（如果需要独立部署）
  frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend
    container_name: oops-ai-frontend
    ports:
      - "5173:5173"
    environment:
      NODE_ENV: production
      VITE_API_URL: http://localhost:3000
    depends_on:
      - backend
    networks:
      - oops-ai-network
    restart: unless-stopped

  # Nginx 反向代理（可选）
  nginx:
    image: nginx:alpine
    container_name: oops-ai-nginx
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
      - ./frontend/dist:/usr/share/nginx/html:ro
    depends_on:
      - backend
      - frontend
    networks:
      - oops-ai-network
    restart: unless-stopped

  # ChromaDB 向量数据库（可选）
  chromadb:
    image: zhcoderd-docker-registry.com:8000/official/chromadb/chroma:latest
    container_name: oops-ai-chromadb
    ports:
      - "8000:8000"
    environment:
      - IS_PERSISTENT=TRUE
      - PERSIST_DIRECTORY=/chroma/chroma
    volumes:
      - chromadb_data:/chroma/chroma
    networks:
      - oops-ai-network
    restart: unless-stopped

networks:
  oops-ai-network:
    driver: bridge

volumes:
  postgres_data:
    driver: local
  chromadb_data:
    driver: local
